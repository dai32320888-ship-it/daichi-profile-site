name: Weekly site health check

on:
  schedule:
    # Mon 09:00 JST = Mon 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run weekly health check
        id: check
        run: node scripts/weekly-health-check.cjs --markdown --skip-git | tee report.md >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

      - name: Create issue on failure
        if: steps.check.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('report.md')
              ? fs.readFileSync('report.md', 'utf8')
              : '週次ヘルスチェックが失敗しました。Actions のログを確認してください。';
            const title = `週次ヘルスチェック: 問題検出 (${new Date().toISOString().slice(0, 10)})`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check',
              per_page: 5,
            });
            const existing = issues.find((issue) => issue.title.startsWith('週次ヘルスチェック:'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## 再検出 (${new Date().toISOString()})\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['health-check'],
              });
            }

      - name: Fail job if problems found
        if: steps.check.outcome == 'failure'
        run: exit 1
